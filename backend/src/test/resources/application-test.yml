spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25

  sql:
    init:
      mode: never

app:
  jwt:
    secret: test-secret-key-must-be-at-least-64-characters-long-for-hmac-sha512-testing
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

  cors:
    allowed-origins: http://localhost:5173

  mail:
    enabled: false

management:
  health:
    mail:
      enabled: false
